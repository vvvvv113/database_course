{% extends "base.html" %}
{% block title %}Add Book — The Shelf{% endblock %}

{% block content %}

<div class="add-book-page">
  <h1>Add a New Book</h1>
  <form method="POST" action="{{ url_for('create_post') }}" class="add-book-form">

    <div class="form-group">
      <label for="title">Title</label>
      <input type="text" id="title" name="title" required placeholder="Book title" />
    </div>

    <div class="form-group">
      <label for="author">Author</label>
      <input type="text" id="author" name="author" required placeholder="Author name" />
    </div>

    <div class="form-group">
      <label for="isbn">ISBN</label>
      <input type="text" id="isbn" name="isbn" placeholder="e.g. 9780000000000" />
    </div>

    <div class="form-group">
      <label for="price">Price ($)</label>
      <input type="number" id="price" name="price" step="0.01" min="0" placeholder="0.00" required />
    </div>

    <div class="form-group">
      <label for="image">Image filename</label>
      <input type="text" id="image" name="image" placeholder="e.g. my_book.jpg" />
      <small>File should be placed in <code>static/book/</code></small>
    </div>

    <div class="form-group">
      <label for="categoryId">Category</label>
      <select id="categoryId" name="categoryId" required>
        <option value="">— Select a category —</option>
        {% for cat in categories %}
        <option value="{{ cat.categoryId }}">{{ cat.categoryName }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="form-group">
      <label>Reading List</label>
      <label class="checkbox-label">
        <input type="checkbox" name="readNow" value="1" />
        Mark as "Reading Now"
      </label>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn-submit">Add Book</button>
      <a href="{{ url_for('read') }}" class="btn-back" style="margin-bottom:0">Cancel</a>
    </div>

  </form>
</div>

{% endblock %}
